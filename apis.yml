aid: marketo
name: Marketo
description: >-
  Marketo, an Adobe company, develops and sells marketing automation software for
  account-based marketing and other marketing services and products, including SEO
  and content creation. Marketo Engage exposes a REST API for programmatic access to
  leads, programs, campaigns, assets, lists, and bulk import/export.
