naftiko: 1.0.0-alpha2
info:
  label: Marketo Engage Rest API — Member
  description: 'Marketo Engage Rest API — Member. 1 operations. Lead operation: Marketo Get Available Form Program Member
    Fields. Self-contained Naftiko capability covering one Marketo business surface.'
  tags:
  - Marketo
  - Member
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MARKETO_API_KEY: MARKETO_API_KEY
capability:
  consumes:
  - type: http
    namespace: engage-rest-member
    baseUri: https://localhost:8080
    description: Marketo Engage Rest API — Member business capability. Self-contained, no shared references.
    resources:
    - name: rest-asset-v1-form-programMemberFields.json
      path: /rest/asset/v1/form/programMemberFields.json
      operations:
      - name: getallprogrammemberfieldsusingget
        method: GET
        description: Marketo Get Available Form Program Member Fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxReturn
          in: query
          type: integer
          description: Maximum number of fields to return. Max 200, default 20
        - name: offset
          in: query
          type: integer
          description: Integer offset for paging
  exposes:
  - type: rest
    namespace: engage-rest-member-rest
    port: 8080
    description: REST adapter for Marketo Engage Rest API — Member. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/asset/v1/form/programmemberfields-json
      name: rest-asset-v1-form-programmemberfields-json
      description: REST surface for rest-asset-v1-form-programMemberFields.json.
      operations:
      - method: GET
        name: getallprogrammemberfieldsusingget
        description: Marketo Get Available Form Program Member Fields
        call: engage-rest-member.getallprogrammemberfieldsusingget
        with:
          maxReturn: rest.maxReturn
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: engage-rest-member-mcp
    port: 9090
    transport: http
    description: MCP adapter for Marketo Engage Rest API — Member. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: marketo-get-available-form-program
      description: Marketo Get Available Form Program Member Fields
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: engage-rest-member.getallprogrammemberfieldsusingget
      with:
        maxReturn: tools.maxReturn
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
