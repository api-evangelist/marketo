naftiko: 1.0.0-alpha2
info:
  label: Marketo Engage Rest API — Tokens
  description: 'Marketo Engage Rest API — Tokens. 3 operations. Lead operation: Marketo Get Tokens by Folder Id. Self-contained
    Naftiko capability covering one Marketo business surface.'
  tags:
  - Marketo
  - Tokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MARKETO_API_KEY: MARKETO_API_KEY
capability:
  consumes:
  - type: http
    namespace: engage-rest-tokens
    baseUri: https://localhost:8080
    description: Marketo Engage Rest API — Tokens business capability. Self-contained, no shared references.
    resources:
    - name: rest-asset-v1-folder-id-tokens.json
      path: /rest/asset/v1/folder/{id}/tokens.json
      operations:
      - name: gettokensbyfolderidusingget
        method: GET
        description: Marketo Get Tokens by Folder Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: id
          required: true
        - name: folderType
          in: query
          type: string
          description: Type of folder. 'Folder' or 'Program'
      - name: addtokentofolderusingpost
        method: POST
        description: Marketo Create Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: Id of the folder to which the token will be associated with
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-asset-v1-folder-id-tokens-delete.json
      path: /rest/asset/v1/folder/{id}/tokens/delete.json
      operations:
      - name: deletetokenbynameusingpost
        method: POST
        description: Marketo Delete Token by Name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: id
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: engage-rest-tokens-rest
    port: 8080
    description: REST adapter for Marketo Engage Rest API — Tokens. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/asset/v1/folder/{id}/tokens-json
      name: rest-asset-v1-folder-id-tokens-json
      description: REST surface for rest-asset-v1-folder-id-tokens.json.
      operations:
      - method: GET
        name: gettokensbyfolderidusingget
        description: Marketo Get Tokens by Folder Id
        call: engage-rest-tokens.gettokensbyfolderidusingget
        with:
          id: rest.id
          folderType: rest.folderType
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addtokentofolderusingpost
        description: Marketo Create Token
        call: engage-rest-tokens.addtokentofolderusingpost
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/asset/v1/folder/{id}/tokens/delete-json
      name: rest-asset-v1-folder-id-tokens-delete-json
      description: REST surface for rest-asset-v1-folder-id-tokens-delete.json.
      operations:
      - method: POST
        name: deletetokenbynameusingpost
        description: Marketo Delete Token by Name
        call: engage-rest-tokens.deletetokenbynameusingpost
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: engage-rest-tokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Marketo Engage Rest API — Tokens. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: marketo-get-tokens-folder-id
      description: Marketo Get Tokens by Folder Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: engage-rest-tokens.gettokensbyfolderidusingget
      with:
        id: tools.id
        folderType: tools.folderType
      outputParameters:
      - type: object
        mapping: $.
    - name: marketo-create-token
      description: Marketo Create Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: engage-rest-tokens.addtokentofolderusingpost
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: marketo-delete-token-name
      description: Marketo Delete Token by Name
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: engage-rest-tokens.deletetokenbynameusingpost
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
