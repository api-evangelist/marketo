naftiko: 1.0.0-alpha2
info:
  label: Marketo Engage Rest API — Segments.json
  description: 'Marketo Engage Rest API — Segments.json. 1 operations. Lead operation: Marketo Get Segments For Segmentation.
    Self-contained Naftiko capability covering one Marketo business surface.'
  tags:
  - Marketo
  - Segments.json
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MARKETO_API_KEY: MARKETO_API_KEY
capability:
  consumes:
  - type: http
    namespace: engage-rest-segments-json
    baseUri: https://localhost:8080
    description: Marketo Engage Rest API — Segments.json business capability. Self-contained, no shared references.
    resources:
    - name: rest-asset-v1-segmentation-id-segments.json
      path: /rest/asset/v1/segmentation/{id}/segments.json
      operations:
      - name: getsegmentsforsegmentationusingget
        method: GET
        description: Marketo Get Segments For Segmentation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: id
          required: true
        - name: status
          in: query
          type: string
          description: Status filter for draft or approved versions
        - name: offset
          in: query
          type: integer
          description: Integer offset for paging
        - name: maxReturn
          in: query
          type: integer
          description: Maximum number of channels to return. Max 200, default 20
  exposes:
  - type: rest
    namespace: engage-rest-segments-json-rest
    port: 8080
    description: REST adapter for Marketo Engage Rest API — Segments.json. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/asset/v1/segmentation/{id}/segments-json
      name: rest-asset-v1-segmentation-id-segments-json
      description: REST surface for rest-asset-v1-segmentation-id-segments.json.
      operations:
      - method: GET
        name: getsegmentsforsegmentationusingget
        description: Marketo Get Segments For Segmentation
        call: engage-rest-segments-json.getsegmentsforsegmentationusingget
        with:
          id: rest.id
          status: rest.status
          offset: rest.offset
          maxReturn: rest.maxReturn
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: engage-rest-segments-json-mcp
    port: 9090
    transport: http
    description: MCP adapter for Marketo Engage Rest API — Segments.json. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: marketo-get-segments-segmentation
      description: Marketo Get Segments For Segmentation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: engage-rest-segments-json.getsegmentsforsegmentationusingget
      with:
        id: tools.id
        status: tools.status
        offset: tools.offset
        maxReturn: tools.maxReturn
      outputParameters:
      - type: object
        mapping: $.
