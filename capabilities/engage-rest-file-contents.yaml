naftiko: 1.0.0-alpha2
info:
  label: Marketo Engage Rest API — File  Contents
  description: 'Marketo Engage Rest API — File  Contents. 1 operations. Lead operation: Marketo Update File Content. Self-contained
    Naftiko capability covering one Marketo business surface.'
  tags:
  - Marketo
  - File  Contents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MARKETO_API_KEY: MARKETO_API_KEY
capability:
  consumes:
  - type: http
    namespace: engage-rest-file-contents
    baseUri: https://localhost:8080
    description: Marketo Engage Rest API — File  Contents business capability. Self-contained, no shared references.
    resources:
    - name: rest-asset-v1-file-id-content.json
      path: /rest/asset/v1/file/{id}/content.json
      operations:
      - name: updatecontentusingpost
        method: POST
        description: Marketo Update File Content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: Id for file in database
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: engage-rest-file-contents-rest
    port: 8080
    description: REST adapter for Marketo Engage Rest API — File  Contents. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/asset/v1/file/{id}/content-json
      name: rest-asset-v1-file-id-content-json
      description: REST surface for rest-asset-v1-file-id-content.json.
      operations:
      - method: POST
        name: updatecontentusingpost
        description: Marketo Update File Content
        call: engage-rest-file-contents.updatecontentusingpost
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: engage-rest-file-contents-mcp
    port: 9090
    transport: http
    description: MCP adapter for Marketo Engage Rest API — File  Contents. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: marketo-update-file-content
      description: Marketo Update File Content
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: engage-rest-file-contents.updatecontentusingpost
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
