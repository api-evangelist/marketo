      call: engage-rest-program.updateprogramusingpost
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: marketo-approve-program
      description: Marketo Approve Program
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: engage-rest-program.approveprogramusingpost
      with:
        id: tools.id
