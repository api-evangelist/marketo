        with:
          name: rest.name
          includeTags: rest.includeTags
          includeCosts: rest.includeCosts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/asset/v1/program/bytag-json
      name: rest-asset-v1-program-bytag-json
      description: REST surface for rest-asset-v1-program-byTag.json.
      operations:
