naftiko: 1.0.0-alpha2
info:
  label: Marketo Engage Rest API — Send
  description: 'Marketo Engage Rest API — Send. 1 operations. Lead operation: Marketo Send Sample Email. Self-contained Naftiko
    capability covering one Marketo business surface.'
  tags:
  - Marketo
  - Send
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MARKETO_API_KEY: MARKETO_API_KEY
capability:
  consumes:
  - type: http
    namespace: engage-rest-send
    baseUri: https://localhost:8080
    description: Marketo Engage Rest API — Send business capability. Self-contained, no shared references.
    resources:
    - name: rest-asset-v1-email-id-sendSample.json
      path: /rest/asset/v1/email/{id}/sendSample.json
      operations:
      - name: sendsampleemailusingpost
        method: POST
        description: Marketo Send Sample Email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: Id of the email
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: engage-rest-send-rest
    port: 8080
    description: REST adapter for Marketo Engage Rest API — Send. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/asset/v1/email/{id}/sendsample-json
      name: rest-asset-v1-email-id-sendsample-json
      description: REST surface for rest-asset-v1-email-id-sendSample.json.
      operations:
      - method: POST
        name: sendsampleemailusingpost
        description: Marketo Send Sample Email
        call: engage-rest-send.sendsampleemailusingpost
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: engage-rest-send-mcp
    port: 9090
    transport: http
    description: MCP adapter for Marketo Engage Rest API — Send. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: marketo-send-sample-email
      description: Marketo Send Sample Email
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: engage-rest-send.sendsampleemailusingpost
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
