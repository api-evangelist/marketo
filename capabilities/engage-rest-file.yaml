naftiko: 1.0.0-alpha2
info:
  label: Marketo Engage Rest API — File
  description: 'Marketo Engage Rest API — File. 3 operations. Lead operation: Marketo Get File by Name. Self-contained Naftiko
    capability covering one Marketo business surface.'
  tags:
  - Marketo
  - File
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MARKETO_API_KEY: MARKETO_API_KEY
capability:
  consumes:
  - type: http
    namespace: engage-rest-file
    baseUri: https://localhost:8080
    description: Marketo Engage Rest API — File business capability. Self-contained, no shared references.
    resources:
    - name: rest-asset-v1-file-byName.json
      path: /rest/asset/v1/file/byName.json
      operations:
      - name: getfilebynameusingget
        method: GET
        description: Marketo Get File by Name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Name of the file
          required: true
    - name: rest-asset-v1-file-id}.json
      path: /rest/asset/v1/file/{id}.json
      operations:
      - name: getfilebyidusingget
        method: GET
        description: Marketo Get File by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: Id for file in database
          required: true
    - name: rest-asset-v1-file-id-content.json
      path: /rest/asset/v1/file/{id}/content.json
      operations:
      - name: updatecontentusingpost
        method: POST
        description: Marketo Update File Content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: Id for file in database
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: engage-rest-file-rest
    port: 8080
    description: REST adapter for Marketo Engage Rest API — File. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/asset/v1/file/byname-json
      name: rest-asset-v1-file-byname-json
      description: REST surface for rest-asset-v1-file-byName.json.
      operations:
      - method: GET
        name: getfilebynameusingget
        description: Marketo Get File by Name
        call: engage-rest-file.getfilebynameusingget
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/asset/v1/file/id-json
      name: rest-asset-v1-file-id-json
      description: REST surface for rest-asset-v1-file-id}.json.
      operations:
      - method: GET
        name: getfilebyidusingget
        description: Marketo Get File by Id
        call: engage-rest-file.getfilebyidusingget
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/asset/v1/file/{id}/content-json
      name: rest-asset-v1-file-id-content-json
      description: REST surface for rest-asset-v1-file-id-content.json.
      operations:
      - method: POST
        name: updatecontentusingpost
        description: Marketo Update File Content
        call: engage-rest-file.updatecontentusingpost
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: engage-rest-file-mcp
    port: 9090
    transport: http
    description: MCP adapter for Marketo Engage Rest API — File. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: marketo-get-file-name
      description: Marketo Get File by Name
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: engage-rest-file.getfilebynameusingget
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: marketo-get-file-id
      description: Marketo Get File by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: engage-rest-file.getfilebyidusingget
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: marketo-update-file-content
      description: Marketo Update File Content
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: engage-rest-file.updatecontentusingpost
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
