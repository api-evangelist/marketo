  description: 'Marketo Engage Rest API — Delete.json. 1 operations. Lead operation: Marketo Delete Snippet. Self-contained
    Naftiko capability covering one Marketo business surface.'
  tags:
  - Marketo
  - Delete.json
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MARKETO_API_KEY: MARKETO_API_KEY
capability:
  consumes:
  - type: http
    namespace: engage-rest-delete-json
    baseUri: https://localhost:8080
    description: Marketo Engage Rest API — Delete.json business capability. Self-contained, no shared references.
    resources:
    - name: rest-asset-v1-snippet-id-delete.json
      path: /rest/asset/v1/snippet/{id}/delete.json
      operations:
      - name: deletesnippetusingpost
        method: POST
        description: Marketo Delete Snippet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: id
          required: true
  exposes:
  - type: rest
    namespace: engage-rest-delete-json-rest
    port: 8080
    description: REST adapter for Marketo Engage Rest API — Delete.json. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/asset/v1/snippet/{id}/delete-json
      name: rest-asset-v1-snippet-id-delete-json
      description: REST surface for rest-asset-v1-snippet-id-delete.json.
      operations:
      - method: POST
        name: deletesnippetusingpost
        description: Marketo Delete Snippet
        call: engage-rest-delete-json.deletesnippetusingpost
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: engage-rest-delete-json-mcp
    port: 9090
    transport: http
    description: MCP adapter for Marketo Engage Rest API — Delete.json. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: marketo-delete-snippet
      description: Marketo Delete Snippet
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: engage-rest-delete-json.deletesnippetusingpost
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
