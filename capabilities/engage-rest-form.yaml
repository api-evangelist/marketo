naftiko: 1.0.0-alpha2
info:
  label: Marketo Engage Rest API — Form
  description: 'Marketo Engage Rest API — Form. 22 operations. Lead operation: Marketo Get Form by Name. Self-contained Naftiko
    capability covering one Marketo business surface.'
  tags:
  - Marketo
  - Form
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
